name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  html:
    runs-on: ubuntu-latest
    name: HTML validation
    steps:
      - uses: actions/checkout@v4
      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: public/
          css: true
